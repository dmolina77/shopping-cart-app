<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MercadoDemo | Tienda Online</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark border-bottom border-warning">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold fs-4" href="#">MercadoDemo</a>
        <button
          class="btn btn-outline-warning position-relative"
          id="btn-open-cart"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasCart"
          aria-controls="offcanvasCart"
          aria-label="Abrir carrito de compras">
          <i class="bi bi-bag fs-4"></i>
          <span
            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark"
            id="cart-count"
            >0</span
          >
        </button>
      </div>
    </nav>
    <!-- Hero -->
    <section class="bg-white border-bottom py-4-px-3 mb-4">
      <div class="container">
        <h1 class="fw-bold fs-2 mb-1">Catálogo de Productos</h1>
        <p class="text-muted">Agrega tus productos al carrito</p>
      </div>
    </section>

    <!-- Catalogo -->
    <main class="container mb-5" id="catalog">
      <h2
        class="fw-semibold fs-5 border-start border-warning border-3 ps-2 mb-4">
        Productos Destacados
      </h2>
      <div
        id="products-grid"
        class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"></div>
    </main>

    <!-- Offcanvas carrito-->
    <div
      class="offcanvas offcanvas-end"
      tabindex="-1"
      id="offcanvasCart"
      aria-labelledby="offcanvasCartLabel">
      <!-- Header -->
      <div
        class="offcanvas-header bg-dark text-white border-bottom border-warning">
        <h2 class="offcanvas-title fs-5 fw-bold" id="offcanvasCartLabel">
          <i class="bi bi-bag me-2"></i>Tu Carrito
        </h2>
        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="offcanvas"
          aria-label="Cerrar"></button>
      </div>

      <!-- Body: lista de productos -->
      <div id="cart-items-container" class="offcanvas-body p-3">
        <!-- Mensaje carrito vacío -->
        <div id="cart-empty-msg" class="text-center text-muted py-5">
          <i class="bi bi-bag-x fs-1 text-secondary"></i>
          <p class="mt-3">
            Tu carrito está vacío.<br />¡Agrega algunos productos!
          </p>
        </div>
      </div>
      <!-- Footer: total y acciones -->
      <div class="border-top p-3 bg-white">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <span class="fw-semibold">Total</span>
          <span id="cart-total" class="fw-bold fs-5">$0.00</span>
        </div>
        <div class="d-flex gap-2">
          <button
            id="btn-clear-cart"
            type="button"
            class="btn btn-outline-danger flex-shrink-0">
            <i class="bi bi-trash me-1"></i>Vaciar
          </button>
          <button
            id="btn-checkout"
            type="button"
            class="btn btn-dark flex-grow-1">
            Finalizar compra <i class="bi bi-arrow-right ms-1"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div
      id="toast-container"
      class="position-fixed bottom-0 end-0 p-3"
      style="z-index: 1100"
      aria-live="polite"
      aria-atomic="true"></div>

    <footer class="bg-dark text-secondary text-center py-4 mt-5">
      <p class="mb-0 small">
        © 2026 <span class="text-warning">MercadoDemo</span> · Práctica
        JavaScript
      </p>
    </footer>

    <!-- Template cart item -->
    <template id="cart-template">
      <div
        class="cart-item d-flex align-items-center gap-2 bg-white border rounded p-2 mb-2"
        data-id="X">
        <img
          src="..."
          alt="..."
          class="rounded"
          width="56"
          height="56"
          style="object-fit: cover" />
        <div class="flex-grow-1 overflow-hidden">
          <p class="cart-item-name fw-semibold small mb-0 text-truncate">
            Nombre
          </p>
          <p class="cart-item-qty text-muted small mb-0">x2 · $79.99 c/u</p>
        </div>
        <span class="cart-item-subtotal fw-bold text-warning small text-nowrap"
          >$159.98</span
        >
        <button
          class="btn-remove-item btn btn-sm btn-outline-danger border-0"
          data-id="X"
          aria-label="Eliminar">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
    </template>

    <!-- Template productos -->
    <template id="product-template">
      <div class="col">
        <article class="card h-100 shadow-sm">
          <img src="" alt="" class="card-img-top" />
          <div class="card-body d-flex flex-column">
            <p class="text-muted small text-uppercase mb-1 fw-semibold"></p>
            <h3 class="card-title fs-6 fw-bold"></h3>
            <p class="fw-bold text-warning fs-5 mb-3"></p>
            <button
              class="btn btn-dark mt-auto btn-add-cart"
              data-id=""
              data-name=""
              data-price=""
              data-img=""
              aria-label="Agregar PRODUCTO al carrito">
              <i class="bi bi-plus-lg me-1"></i> Agregar al carrito
            </button>
          </div>
        </article>
      </div>
    </template>

    <!-- Template toast -->
    <template id="toast-template">
      <div
        class="toast align-items-center text-bg-dark border-0 show"
        role="alert">
        <div class="d-flex">
          <div class="toast-body"></div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"></button>
        </div>
      </div>
    </template>

    <!-- Scripts BS y JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script src="app.js"></script>
  </body>
</html>
